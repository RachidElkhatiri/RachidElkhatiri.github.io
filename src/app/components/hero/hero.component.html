<section id="hero">
  <div class="section-shell !pt-10 sm:!pt-14">
    <div class="grid lg:grid-cols-[1.1fr_0.9fr] gap-10 items-center">
      <div appRevealOnScroll>
        <p class="section-kicker mb-4">Full Stack Developer | Java / Angular</p>
        <h1 class="text-4xl sm:text-5xl lg:text-6xl leading-[1.05] font-bold max-w-[14ch]">
          Je construis des produits web fiables, rapides et premium.
        </h1>
        <p class="mt-5 text-base sm:text-lg text-[var(--text-secondary)] max-w-[62ch]">
          {{ profile.shortIntro }}
        </p>
        <p class="mt-3 text-[var(--text-secondary)] max-w-[62ch]">
          {{ profile.heroDescription }}
        </p>

        <div class="mt-8 flex flex-wrap gap-3">
          <a routerLink="/cv-viewer" class="btn-primary-premium">
            <i class="fa-solid fa-eye"></i>
            Visualiser mon CV
          </a>
          <a [href]="cvDownloadPath" download="Rachid-EL-KHATIRI-CV.pdf" class="btn-secondary-premium">
            <i class="fa-solid fa-download"></i>
            Telecharger CV
          </a>
          <button type="button" class="btn-secondary-premium" (click)="scrollToProjects()">Voir mes projets</button>
          <button type="button" class="btn-secondary-premium" (click)="scrollToContact()">Me contacter</button>
        </div>
      </div>

      <div appRevealOnScroll>
        <div class="premium-card p-3 sm:p-4 relative overflow-hidden">
          <div class="absolute -top-8 -right-8 h-32 w-32 rounded-full bg-sky-200/35 blur-2xl"></div>
          <div class="absolute -bottom-10 -left-8 h-36 w-36 rounded-full bg-pink-200/35 blur-2xl"></div>
          <img
            [src]="profile.avatar"
            [alt]="'Photo de ' + profile.fullName"
            class="h-[420px] sm:h-[500px] w-full object-cover rounded-2xl relative z-10">
          <div class="absolute left-8 bottom-8 z-20 bg-black/70 text-white rounded-full px-4 py-2 text-sm font-semibold flex items-center gap-2">
            <i class="fa-solid fa-code"></i>
            Spring Boot + Angular
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
