<section id="github">
  <div class="section-shell">
    <div class="mb-10 max-w-3xl" appRevealOnScroll>
      <p class="section-kicker">GitHub</p>
      <h3 class="section-title">Contributions et activite open source</h3>
    </div>

    <div class="grid lg:grid-cols-[1.1fr_0.9fr] gap-6">
      <div class="premium-card p-4 sm:p-5" appRevealOnScroll>
        <img
          class="w-full rounded-2xl border border-[var(--border)] mb-4"
          [src]="'https://github-readme-stats.vercel.app/api?username=' + githubUsername + '&show_icons=true&theme=transparent'"
          alt="GitHub stats">
        <img
          class="w-full rounded-2xl border border-[var(--border)]"
          [src]="'https://github-readme-activity-graph.vercel.app/graph?username=' + githubUsername + '&theme=github-light&hide_border=true'"
          alt="GitHub contribution graph">
      </div>

      <aside class="premium-card p-6" appRevealOnScroll>
        <h4 class="text-xl font-semibold mb-4">Repos recents</h4>
        <div class="space-y-3">
          @for (repo of repos; track repo.name) {
            <a
              [href]="repo.link"
              target="_blank"
              rel="noopener noreferrer"
              class="block rounded-2xl border border-[var(--border)] bg-[var(--surface-soft)] p-4 hover:border-[#cfd9eb] transition-colors">
              <h5 class="text-base font-semibold mb-1">{{ repo.name }}</h5>
              <p class="text-sm text-[var(--text-secondary)] mb-0">{{ repo.description }}</p>
            </a>
          }
        </div>
      </aside>
    </div>
  </div>
</section>
