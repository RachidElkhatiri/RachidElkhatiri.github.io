<section id="projects" class="section-space">
  <div class="container">
    <div class="section-header" appRevealOnScroll>
      <p class="section-kicker">Projets</p>
      <h3>Realisations techniques recentes</h3>
    </div>

    <div class="row g-4">
      @for (project of projects; track project.name) {
        <div class="col-lg-6" appRevealOnScroll>
          <article class="card-modern project-card h-100">
            <img [src]="project.image" [alt]="'Image projet ' + project.name">
            <div class="p-4">
              <h4>{{ project.name }}</h4>
              <p>{{ project.description }}</p>

              <div class="tech-grid mb-4">
                @for (tech of project.technologies; track tech) {
                  <span>{{ tech }}</span>
                }
              </div>

              <div class="d-flex flex-wrap gap-2">
                <a [href]="project.github" class="btn btn-outline-modern" target="_blank" rel="noopener noreferrer">
                  <i class="fa-brands fa-github"></i> Voir le code
                </a>
                <a [href]="project.demo" class="btn btn-accent" target="_blank" rel="noopener noreferrer">
                  <i class="fa-solid fa-play"></i> Demo
                </a>
              </div>
            </div>
          </article>
        </div>
      }
    </div>
  </div>
</section>
