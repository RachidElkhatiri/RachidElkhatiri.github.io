<section id="about" class="section-space">
  <div class="container">
    <div class="section-header" appRevealOnScroll>
      <p class="section-kicker">A propos</p>
      <h3>Profil professionnel</h3>
    </div>

    <div class="row g-4">
      <div class="col-lg-7" appRevealOnScroll>
        <div class="card-modern p-4 p-lg-5 h-100">
          <p>{{ profile.aboutSummary }}</p>
          <div class="mt-4 stats-chip">
            <span>{{ profile.yearsExperience }}+ ans d experience</span>
            <span>Expert Java / Spring / Angular</span>
          </div>
        </div>
      </div>

      <div class="col-lg-5" appRevealOnScroll>
        <div class="card-modern p-4 h-100">
          <h4 class="mb-3">Domaines d expertise</h4>
          <ul class="list-clean mb-0">
            @for (area of profile.expertiseAreas; track area) {
              <li><i class="fa-solid fa-check"></i> {{ area }}</li>
            }
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>
